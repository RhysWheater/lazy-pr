name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  lint:
    uses: .github/workflows/ci.yml

  publish:
    needs: lint
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: ${{ !github.event.act }}  # skip during local actions testing

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

